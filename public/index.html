<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1 class="app-title">Weather Dashboard</h1>

    <section class="layout">
      <!-- LEFT: search + weather card + add to favorites -->
      <div class="left">
        <div class="search">
          <input id="cityInput" type="text" placeholder="Enter city (e.g., Berlin)" autocomplete="off" />
          <button id="searchBtn">Search</button>
          <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <div id="result" class="card">
          <!-- optional placeholder -->
          <p class="placeholder">Search for a city to see the weather.</p>
        </div>

        <div class="actions">
          <button id="favBtn" style="display:none;">⭐ Add to Favorites</button>
        </div>
      </div>

      <!-- RIGHT: favorites -->
      <aside class="right">
        <h2>Favorites</h2>
        <div class="favorites-box">
          <ul id="favList"></ul>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
